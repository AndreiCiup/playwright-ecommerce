trigger: none
pr: none

parameters:
  - name: tags
    displayName: 'Test tags to run'
    type: string
    default: ''
    values:
      - ''
      - '@smoke'
      - '@auth'
      - '@products'
      - '@cart'
      - '@checkout'
      - '@e2e'

pool:
  vmImage: ubuntu-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Install Node.js'

  - script: npm ci
    displayName: 'Install dependencies'

  - script: npx playwright install --with-deps
    displayName: 'Install Playwright browsers'

  - script: |
      if [ -z "${{ parameters.tags }}" ]; then
        npx playwright test
      else
        npx playwright test --grep "${{ parameters.tags }}"
      fi
    displayName: 'Run Playwright tests'
    continueOnError: true

  - script: npx allure generate allure-results --clean -o allure-report
    displayName: 'Generate Allure report'
    condition: always()

  - task: PublishPipelineArtifact@1
    displayName: 'Upload Allure report'
    inputs:
      targetPath: allure-report
      artifact: allure-report
      publishLocation: pipeline
    condition: always()

  - task: PublishPipelineArtifact@1
    displayName: 'Upload Playwright HTML report'
    inputs:
      targetPath: playwright-report
      artifact: playwright-report
      publishLocation: pipeline
    condition: always()
